<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../logo.png">
    <title>QuickHangul - Master Korean</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+KR:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        :root {
            /* Inherits variables from styles.css */
            --accent-hangul: var(--accent);
            --accent-glow-hangul: var(--accent-glow);
            --error: #ef4444;
            --success: #10b981;
            --font-kr: 'Noto Sans KR', sans-serif;
            --font-serif: 'Playfair Display', serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* Nav override for full screen apps */
        nav {
            padding: 15px 30px !important;
            border-bottom: 1px solid rgba(255,255,255,0.05) !important;
        }
        .logo { font-size: 1.1rem !important; }
        .nav-links a { font-size: 0.75rem !important; margin-left: 20px !important; }

        .ambient-light {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            pointer-events: none;
            z-index: -1;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.25;
            animation: float 25s infinite ease-in-out;
        }
        .orb-1 { top: -10%; left: -10%; width: 60vw; height: 60vw; background: radial-gradient(circle, var(--accent-hangul), transparent); }
        .orb-2 { bottom: -10%; right: -10%; width: 70vw; height: 70vw; background: radial-gradient(circle, #3b82f6, transparent); animation-delay: -12s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(40px, 60px) scale(1.1); }
        }

        .glass-card {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4);
        }

        h1, h2, .serif-font { font-family: var(--font-serif); }
        .kr-font { font-family: var(--font-kr); }

        .btn-primary {
            background: var(--accent-hangul);
            color: var(--bg-dark);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px var(--accent-glow-hangul);
            font-weight: 600;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 6px 20px var(--accent-glow-hangul);
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            transition: all 0.2s ease;
        }
        .btn-outline.selected {
            background: rgba(212, 175, 55, 0.15);
            border-color: var(--accent-hangul);
            color: white;
        }

        .btn-option {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-option:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.02);
        }
        .btn-option.correct { background: rgba(16, 185, 129, 0.2); border-color: var(--success); color: var(--success); }
        .btn-option.wrong { background: rgba(239, 68, 68, 0.2); border-color: var(--error); color: var(--error); }

        #progress-bar {
            position: fixed;
            top: 0; left: 0; width: 0%; height: 6px;
            background: linear-gradient(to right, #3b82f6, var(--accent-hangul));
            transition: width 0.4s ease;
            z-index: 100;
            box-shadow: 0 0 15px var(--accent-hangul);
        }

        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Syllable Builder Styles */
        .builder-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .builder-column {
            background: rgba(255,255,255,0.03);
            padding: 10px;
            border-radius: 16px;
            max-height: 400px;
            overflow-y: auto;
        }
        .builder-item {
            padding: 8px;
            margin-bottom: 6px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid transparent;
            background: rgba(255,255,255,0.05);
            transition: all 0.2s;
        }
        .builder-item:hover { background: rgba(255,255,255,0.1); }
        .builder-item.selected { border-color: var(--accent-hangul); background: rgba(212, 175, 55, 0.2); }

        /* Custom Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.1);
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent-hangul); }
        input:checked + .slider:before { transform: translateX(26px); }

        /* Visualization Grid */
        .viz-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 2px;
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 2px;
        }
        .viz-block { background: rgba(255,255,255,0.05); border-radius: 2px; transition: background 0.3s; }
        .viz-block.active { background: var(--accent-hangul); box-shadow: 0 0 8px var(--accent-hangul); }

        /* Writing Mode */
        #writing-canvas {
            cursor: crosshair;
            touch-action: none;
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
            border: 2px dashed rgba(255,255,255,0.1);
        }

        /* Mastery Dots */
        .mastery-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }

        /* Virtual Keyboard */
        .keyboard-container {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }
        .keyboard-row {
            display: flex;
            gap: 6px;
        }
        .key {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.1s;
            user-select: none;
        }
        .key:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); }
        .key:active, .key.active { background: var(--accent-hangul); border-color: var(--accent-hangul); color: var(--bg-dark); transform: translateY(0); box-shadow: 0 0 15px var(--accent-glow-hangul); }
        .key .eng { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
        .key .kor { font-weight: bold; font-family: var(--font-kr); }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <header><nav></nav></header>

    <div id="progress-bar"></div>
    <div class="ambient-light">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <main class="flex-grow flex items-center justify-center p-4 w-full relative z-10">
        <div class="w-full max-w-3xl">

            <!-- Start Screen -->
            <section id="start-screen" class="glass-card p-10 md:p-14 text-center fade-in">
                <h1 class="text-6xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-br from-white to-gray-500">
                    QuickHangul
                </h1>
                <p class="text-[#94a3b8] mb-12">Master Korean characters with ease</p>

                <div class="max-w-xl mx-auto space-y-10 mb-12 text-left">
                    <!-- Content Selection -->
                    <div>
                        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4 text-center">What to practice?</h3>
                        <div class="flex flex-wrap justify-center gap-2" id="cat-selectors">
                            <button class="btn-outline selected px-4 py-2 rounded-xl text-xs" data-cat="consonants">Consonants</button>
                            <button class="btn-outline selected px-4 py-2 rounded-xl text-xs" data-cat="vowels">Vowels</button>
                            <button class="btn-outline px-4 py-2 rounded-xl text-xs" data-cat="doubleConsonants">Double Cons.</button>
                            <button class="btn-outline px-4 py-2 rounded-xl text-xs" data-cat="diphthongs">Diphthongs</button>
                            <button class="btn-outline px-4 py-2 rounded-xl text-xs" data-cat="vocabulary">Vocabulary</button>
                        </div>
                    </div>

                    <!-- Mode Selection -->
                    <div>
                        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4 text-center">How to practice?</h3>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                            <button class="btn-outline selected p-3 rounded-xl text-xs text-center" data-mode="quiz">Quiz</button>
                            <button class="btn-outline p-3 rounded-xl text-xs text-center" data-mode="flashcards">Flashcards</button>
                            <button class="btn-outline p-3 rounded-xl text-xs text-center" data-mode="writing">Writing</button>
                            <button class="btn-outline p-3 rounded-xl text-xs text-center" data-mode="speedMatch">Speed</button>
                            <button class="btn-outline p-3 rounded-xl text-xs text-center" data-mode="builder">Builder</button>
                            <button class="btn-outline p-3 rounded-xl text-xs text-center" data-mode="typing">Typing</button>
                        </div>
                    </div>

                    <div class="flex items-center justify-between p-4 bg-white/5 rounded-2xl max-w-xs mx-auto">
                        <span class="text-sm font-medium">Reverse Mode</span>
                        <label class="switch">
                            <input type="checkbox" id="reverse-toggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

                <button id="start-button" class="btn-primary w-full max-sm py-5 px-8 rounded-2xl text-2xl font-bold transition-all hover:scale-105 active:scale-95">
                    START
                </button>

                <!-- Mastery Dashboard -->
                <div id="mastery-dashboard" class="border-t border-white/10 pt-10">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-6">Your Mastery</h3>
                    <div id="mastery-grid" class="flex flex-wrap justify-center gap-2 max-h-40 overflow-y-auto p-4 bg-white/5 rounded-2xl">
                        <!-- Mastery dots will be injected here -->
                    </div>
                </div>
            </section>

            <!-- Main Study Screen -->
            <section id="study-screen" class="hidden w-full">
                <div class="glass-card p-10 md:p-14 text-center relative overflow-hidden">
                    <div class="flex justify-between items-center mb-10 text-xs font-mono tracking-widest text-[#94a3b8]">
                        <button id="quit-button" class="hover:text-white">EXIT SESSION</button>
                        <div class="flex gap-4 items-center">
                            <div id="timer-display" class="hidden bg-accent/20 text-accent p-2 px-4 rounded-lg font-bold">60s</div>
                            <div class="flex items-center gap-2 bg-white/5 p-2 rounded-lg text-[10px]">
                                <span>SPEED</span>
                                <input type="range" id="speed-slider" min="0.5" max="1.5" step="0.1" value="0.9" class="w-16 accent-accent">
                            </div>
                            <button id="audio-button" class="bg-white/10 p-2 rounded-lg hover:bg-white/20 transition-all">
                                🔊 REPLAY
                            </button>
                            <div class="flex items-center gap-4 border-l border-white/10 pl-4">
                                <span>SCORE: <span id="score-counter" class="text-white">0</span></span>
                                <span>STREAK: <span id="streak-counter" class="text-accent">0</span></span>
                            </div>
                        </div>
                    </div>

                    <!-- Question Area -->
                    <div id="quiz-area" class="h-64 flex flex-col items-center justify-center mb-10 relative cursor-pointer group" id="main-display-area">
                        <div id="question-display" class="kr-font text-8xl md:text-9xl font-bold drop-shadow-xl transition-all duration-300">
                            ㄱ
                        </div>
                        <div id="writing-area" class="hidden absolute inset-0 flex items-center justify-center pointer-events-none">
                            <canvas id="writing-canvas" width="400" height="400" class="pointer-events-auto"></canvas>
                        </div>
                        <div id="writing-instruction" class="hidden absolute bottom-0 text-[10px] text-gray-500 uppercase tracking-widest animate-pulse">
                            Trace the character above
                        </div>
                        <div id="fc-instruction" class="hidden absolute bottom-0 text-[10px] text-gray-400 uppercase tracking-widest group-hover:text-accent transition-colors">
                            Click card to flip
                        </div>
                    </div>

                    <!-- Syllable Builder Area -->
                    <div id="builder-area" class="hidden space-y-8">
                        <div class="flex flex-col items-center gap-6">
                            <div class="w-48 h-48 bg-white/5 rounded-3xl border-2 border-dashed border-white/20 flex items-center justify-center relative group">
                                <span id="built-syllable" class="kr-font text-8xl font-bold">?</span>
                                <div class="absolute top-4 right-4 viz-grid" id="syllable-viz">
                                    <div class="viz-block" data-part="i"></div><div class="viz-block" data-part="i"></div><div class="viz-block"></div>
                                    <div class="viz-block" data-part="m"></div><div class="viz-block" data-part="m"></div><div class="viz-block" data-part="m"></div>
                                    <div class="viz-block" data-part="f"></div><div class="viz-block" data-part="f"></div><div class="viz-block" data-part="f"></div>
                                </div>
                                <button id="play-built" class="absolute bottom-2 right-2 bg-accent/20 p-2 rounded-full opacity-0 group-hover:opacity-100 transition-opacity">🔊</button>
                            </div>
                            <div class="flex items-center gap-4">
                                <div id="built-info" class="text-sm font-mono text-gray-400 uppercase tracking-widest">g + a + ...</div>
                                <button id="dict-check" class="bg-white/10 p-2 px-4 rounded-xl text-[10px] font-bold hover:bg-white/20">DICTIONARY CHECK</button>
                            </div>
                        </div>

                        <div class="builder-grid">
                            <div class="builder-column" id="col-initial"></div>
                            <div class="builder-column" id="col-medial"></div>
                            <div class="builder-column" id="col-final"></div>
                        </div>
                    </div>

                    <!-- Virtual Keyboard Area -->
                    <div id="keyboard-area" class="hidden">
                        <div class="keyboard-container" id="virtual-keyboard">
                            <!-- Rows injected by JS -->
                        </div>
                    </div>

                    <!-- Options Grid -->
                    <div id="options-grid" class="grid grid-cols-2 gap-4">
                        <!-- Buttons -->
                    </div>

                    <!-- Writing Controls -->
                    <div id="writing-controls" class="hidden flex justify-center gap-6 pt-6">
                        <button class="btn-outline p-4 px-8 rounded-2xl font-bold" id="clear-writing">CLEAR</button>
                        <button class="btn-outline p-4 px-8 rounded-2xl font-bold flex items-center gap-2" id="play-stroke">
                            <span>▶</span> STROKE GUIDE
                        </button>
                        <button class="btn-primary p-4 px-12 rounded-2xl font-bold" id="submit-writing">SUBMIT</button>
                    </div>

                    <!-- Flashcard Controls -->
                    <div id="fc-controls" class="hidden flex justify-center gap-6 pt-6">
                        <button class="btn-outline p-4 rounded-full w-16 h-16" id="prev-fc">←</button>
                        <button class="btn-primary p-4 rounded-full w-20 h-20 text-2xl" id="flip-fc">↻</button>
                        <button class="btn-outline p-4 rounded-full w-16 h-16" id="next-fc">→</button>
                    </div>
                </div>
            </section>

            <!-- Results Screen -->
            <section id="results-screen" class="hidden glass-card p-12 text-center fade-in">
                <h2 class="text-4xl font-bold mb-8">Session Complete</h2>
                <div class="grid grid-cols-3 gap-4 mb-10">
                    <div class="p-6 bg-white/5 rounded-2xl">
                        <div class="text-[10px] text-gray-400 mb-2">SCORE</div>
                        <div id="final-score" class="text-3xl font-bold">0</div>
                    </div>
                    <div class="p-6 bg-white/5 rounded-2xl">
                        <div class="text-[10px] text-gray-400 mb-2">ACCURACY</div>
                        <div id="final-acc" class="text-3xl font-bold">0%</div>
                    </div>
                    <div class="p-6 bg-white/5 rounded-2xl">
                        <div class="text-[10px] text-gray-400 mb-2">BEST STREAK</div>
                        <div id="final-streak" class="text-3xl font-bold text-accent">0</div>
                    </div>
                </div>
                <div class="flex gap-4 justify-center">
                    <button id="retry-btn" class="btn-primary py-4 px-10 rounded-2xl font-bold">RETRY</button>
                    <button id="home-btn" class="btn-outline py-4 px-10 rounded-2xl font-bold">MAIN MENU</button>
                </div>
            </section>

        </div>
    </main>

    <script src="../components.js"></script>
    <script>
        // --- Data Definitions ---
        const JAMO = {
            initials: ['ㄱ', 'ㄲ', 'ㄴ', 'ㄷ', 'ㄸ', 'ㄹ', 'ㅁ', 'ㅂ', 'ㅃ', 'ㅅ', 'ㅆ', 'ㅇ', 'ㅈ', 'ㅉ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'],
            medials: ['ㅏ', 'ㅐ', 'ㅑ', 'ㅒ', 'ㅓ', 'ㅔ', 'ㅕ', 'ㅖ', 'ㅗ', 'ㅘ', 'ㅙ', 'ㅚ', 'ㅛ', 'ㅜ', 'ㅝ', 'ㅞ', 'ㅟ', 'ㅠ', 'ㅡ', 'ㅢ', 'ㅣ'],
            finals: ['', 'ㄱ', 'ㄲ', 'ㄳ', 'ㄴ', 'ㄵ', 'ㄶ', 'ㄷ', 'ㄹ', 'ㄺ', 'ㄻ', 'ㄼ', 'ㄽ', 'ㄾ', 'ㄿ', 'ㅀ', 'ㅁ', 'ㅂ', 'ㅄ', 'ㅅ', 'ㅆ', 'ㅇ', 'ㅈ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ']
        };

        const HANGUL_DATA = {
            consonants: { 'ㄱ': 'g', 'ㄴ': 'n', 'ㄷ': 'd', 'ㄹ': 'r', 'ㅁ': 'm', 'ㅂ': 'b', 'ㅅ': 's', 'ㅇ': 'ng', 'ㅈ': 'j', 'ㅊ': 'ch', 'ㅋ': 'k', 'ㅌ': 't', 'ㅍ': 'p', 'ㅎ': 'h' },
            doubleConsonants: { 'ㄲ': 'kk', 'ㄸ': 'tt', 'ㅃ': 'pp', 'ㅆ': 'ss', 'ㅉ': 'jj' },
            vowels: { 'ㅏ': 'a', 'ㅑ': 'ya', 'ㅓ': 'eo', 'ㅕ': 'yeo', 'ㅗ': 'o', 'ㅛ': 'yo', 'ㅜ': 'u', 'ㅠ': 'yu', 'ㅡ': 'eu', 'ㅣ': 'i' },
            diphthongs: { 'ㅐ': 'ae', 'ㅒ': 'yae', 'ㅔ': 'e', 'ㅖ': 'ye', 'ㅘ': 'wa', 'ㅙ': 'wae', 'ㅚ': 'oe', 'ㅝ': 'wo', 'ㅞ': 'we', 'ㅟ': 'wi', 'ㅢ': 'ui' },
            vocabulary: {
                '사과': 'sagwa', '우유': 'uyu', '고기': 'gogi', '나라': 'nara', '도시': 'dosi', '아이': 'ai', '오이': 'oi', '모자': 'moja',
                '학교': 'hakgyo', '바다': 'bada', '하늘': 'haneul', '커피': 'keopi', '빵': 'ppang', '물': 'mul', '노래': 'norae'
            }
        };

        const ROMAN_MAP = { ...HANGUL_DATA.consonants, ...HANGUL_DATA.doubleConsonants, ...HANGUL_DATA.vowels, ...HANGUL_DATA.diphthongs };

        const STROKE_PATHS = {
            'ㄱ': [[50,100, 350,100], [350,100, 350,350]],
            'ㄴ': [[100,50, 100,300], [100,300, 350,300]],
            'ㄷ': [[100,100, 300,100], [100,100, 100,300], [100,300, 300,300]],
            'ㄹ': [[100,80, 300,80], [300,80, 300,180], [100,180, 300,180], [100,180, 100,280], [100,280, 300,280]],
            'ㅁ': [[100,100, 100,300], [100,100, 300,100], [300,100, 300,300], [100,300, 300,300]],
            'ㅂ': [[100,100, 100,300], [300,100, 300,300], [100,200, 300,200], [100,300, 300,300]],
            'ㅅ': [[200,100, 100,300], [200,100, 300,300]],
            'ㅇ': [[200,100, 300,200, 200,300, 100,200, 200,100]], // Simple circle
            'ㅈ': [[100,100, 300,100], [200,100, 100,300], [200,150, 300,300]],
            'ㅊ': [[200,50, 200,100], [100,100, 300,100], [200,100, 100,300], [200,150, 300,300]],
            'ㅋ': [[50,100, 350,100], [350,100, 350,350], [50,220, 250,220]],
            'ㅌ': [[100,100, 300,100], [100,200, 300,200], [100,300, 300,300], [100,100, 100,300]],
            'ㅍ': [[100,100, 300,100], [100,300, 300,300], [150,100, 150,300], [250,100, 250,300]],
            'ㅎ': [[180,50, 220,50], [100,120, 300,120], [200,170, 300,270, 200,370, 100,270, 200,170]],
            'ㅏ': [[200,50, 200,350], [200,200, 300,200]],
            'ㅑ': [[200,50, 200,350], [200,150, 300,150], [200,250, 300,250]],
            'ㅓ': [[200,50, 200,350], [100,200, 200,200]],
            'ㅕ': [[200,50, 200,350], [100,150, 200,150], [100,250, 200,250]],
            'ㅗ': [[200,150, 200,250], [50,250, 350,250]],
            'ㅛ': [[150,150, 150,250], [250,150, 250,250], [50,250, 350,250]],
            'ㅜ': [[50,150, 350,150], [200,150, 200,350]],
            'ㅠ': [[50,150, 350,150], [150,150, 150,350], [250,150, 250,350]],
            'ㅡ': [[50,200, 350,200]],
            'ㅣ': [[200,50, 200,350]]
        };

        const KEYBOARD_MAP = {
            'q': 'ㅂ', 'w': 'ㅈ', 'e': 'ㄷ', 'r': 'ㄱ', 't': 'ㅅ', 'y': 'ㅛ', 'u': 'ㅕ', 'i': 'ㅑ', 'o': 'ㅐ', 'p': 'ㅔ',
            'a': 'ㅁ', 's': 'ㄴ', 'd': 'ㅇ', 'f': 'ㄹ', 'g': 'ㅎ', 'h': 'ㅗ', 'j': 'ㅓ', 'k': 'ㅏ', 'l': 'ㅣ',
            'z': 'ㅋ', 'x': 'ㅌ', 'c': 'ㅊ', 'v': 'ㅍ', 'b': 'ㅠ', 'n': 'ㅜ', 'm': 'ㅡ',
            'Q': 'ㅃ', 'W': 'ㅉ', 'E': 'ㄸ', 'R': 'ㄲ', 'T': 'ㅆ', 'O': 'ㅒ', 'P': 'ㅖ'
        };

        const KEYBOARD_ROWS = [
            ['q','w','e','r','t','y','u','i','o','p'],
            ['a','s','d','f','g','h','j','k','l'],
            ['z','x','c','v','b','n','m']
        ];

        // --- State Management ---
        const State = {
            mode: 'quiz',
            activeCats: ['consonants', 'vowels'],
            isReverse: false,
            currentDict: {},
            currentKeys: [],
            score: 0,
            streak: 0,
            maxStreak: 0,
            qCount: 0,
            maxQ: 15,
            currentQ: null,
            isProcessing: false,
            builder: { i: 0, m: 0, f: 0 },
            flashcards: { index: 0, isFlipped: false, pool: [] },
            timer: { count: 60, interval: null },
            writing: { isDrawing: false, lastX: 0, lastY: 0, hasDrawn: false },
            settings: { audioSpeed: 0.9, theme: 'modern' },
            persistence: {
                totalScore: 0,
                bestStreak: 0,
                mastery: {} // char -> { correct: 0, total: 0 }
            }
        };

        function saveStats() {
            localStorage.setItem('quickhangul_stats', JSON.stringify(State.persistence));
            localStorage.setItem('quickhangul_settings', JSON.stringify(State.settings));
        }

        function loadStats() {
            const stats = localStorage.getItem('quickhangul_stats');
            if (stats) State.persistence = JSON.parse(stats);
            const settings = localStorage.getItem('quickhangul_settings');
            if (settings) State.settings = JSON.parse(settings);
        }

        function renderMastery() {
            const grid = document.getElementById('mastery-grid');
            grid.innerHTML = '';
            
            // All possible jamo/vocab in currently active categories
            const allItems = { ...HANGUL_DATA.consonants, ...HANGUL_DATA.vowels, ...HANGUL_DATA.doubleConsonants, ...HANGUL_DATA.diphthongs };
            
            Object.keys(allItems).forEach(char => {
                const data = State.persistence.mastery[char] || { correct: 0, total: 0 };
                const ratio = data.total > 0 ? data.correct / data.total : 0;
                
                const dot = document.createElement('div');
                dot.className = "mastery-dot";
                dot.title = `${char}: ${data.correct}/${data.total}`;
                
                if (data.total > 0) {
                    if (ratio > 0.8) dot.style.background = "var(--success)";
                    else if (ratio > 0.5) dot.style.background = "#fbbf24"; // yellow
                    else dot.style.background = "var(--accent)";
                }
                grid.appendChild(dot);
            });
        }

        // --- DOM Cache ---
        const ui = {
            screens: { start: document.getElementById('start-screen'), study: document.getElementById('study-screen'), results: document.getElementById('results-screen') },
            progressBar: document.getElementById('progress-bar'),
            question: document.getElementById('question-display'),
            options: document.getElementById('options-grid'),
            score: document.getElementById('score-counter'),
            streak: document.getElementById('streak-counter'),
            areas: { 
                quiz: document.getElementById('quiz-area'), 
                builder: document.getElementById('builder-area'),
                writing: document.getElementById('writing-area'),
                keyboard: document.getElementById('keyboard-area')
            },
            built: document.getElementById('built-syllable'),
            builtInfo: document.getElementById('built-info'),
            canvas: document.getElementById('writing-canvas'),
            ctx: document.getElementById('writing-canvas').getContext('2d'),
            timer: document.getElementById('timer-display')
        };

        // --- Core Functions ---
        function init() {
            loadStats();
            renderMastery();
            if (State.settings.audioSpeed) {
                document.getElementById('speed-slider').value = State.settings.audioSpeed;
            }

            // Category setup
            document.querySelectorAll('[data-cat]').forEach(btn => {
                btn.onclick = () => {
                    const cat = btn.dataset.cat;
                    if (State.activeCats.includes(cat)) {
                        if (State.activeCats.length > 1) {
                            State.activeCats = State.activeCats.filter(c => c !== cat);
                            btn.classList.remove('selected');
                        }
                    } else {
                        State.activeCats.push(cat);
                        btn.classList.add('selected');
                    }
                    renderMastery();
                };
            });

            // Mode setup
            document.querySelectorAll('[data-mode]').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    State.mode = btn.dataset.mode;
                };
            });

            // Interactive Question Area
            document.getElementById('quiz-area').onclick = () => {
                if (State.mode === 'flashcards') flipFlashcard();
            };

            // Navigation
            document.getElementById('start-button').onclick = startSession;
            document.getElementById('quit-button').onclick = () => {
                clearInterval(State.timer.interval);
                showScreen('start');
            };
            document.getElementById('audio-button').onclick = () => speak(State.currentQ.char);
            document.getElementById('play-built').onclick = () => speak(ui.built.textContent);
            document.getElementById('home-btn').onclick = () => showScreen('start');
            document.getElementById('retry-btn').onclick = startSession;

            // Flashcard Controls
            document.getElementById('flip-fc').onclick = flipFlashcard;
            document.getElementById('next-fc').onclick = () => moveFlashcard(1);
            document.getElementById('prev-fc').onclick = () => moveFlashcard(-1);

            // Writing Controls
            document.getElementById('clear-writing').onclick = clearCanvas;
            document.getElementById('play-stroke').onclick = playStrokeGuide;
            document.getElementById('submit-writing').onclick = () => submitAnswer(State.currentQ.answer);

            // Builder
            document.getElementById('dict-check').onclick = checkDictionary;
            // Canvas logic setup
            ui.canvas.addEventListener('mousedown', startDrawing);
            ui.canvas.addEventListener('mousemove', draw);
            ui.canvas.addEventListener('mouseup', stopDrawing);
            ui.canvas.addEventListener('mouseout', stopDrawing);
            ui.canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e.touches[0]); });
            ui.canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e.touches[0]); });
            ui.canvas.addEventListener('touchend', (e) => { e.preventDefault(); stopDrawing(); });
        }

        async function playStrokeGuide() {
            const char = State.currentQ.char;
            const strokes = STROKE_PATHS[char];
            if (!strokes) return;

            const btn = document.getElementById('play-stroke');
            btn.disabled = true;
            btn.classList.add('opacity-50');

            // Clear canvas temporarily for guide
            clearCanvas();

            for (const stroke of strokes) {
                for (let i = 0; i < stroke.length - 2; i += 2) {
                    await animatePath(stroke[i], stroke[i+1], stroke[i+2], stroke[i+3]);
                }
                await new Promise(r => setTimeout(r, 300)); // Pause between strokes
            }

            btn.disabled = false;
            btn.classList.remove('opacity-50');
        }

        function animatePath(x1, y1, x2, y2) {
            return new Promise(resolve => {
                const steps = 20;
                let currentStep = 0;
                
                function frame() {
                    const x = x1 + (x2 - x1) * (currentStep / steps);
                    const y = y1 + (y2 - y1) * (currentStep / steps);
                    
                    // Draw guide dot
                    ui.ctx.beginPath();
                    ui.ctx.arc(x, y, 6, 0, Math.PI * 2);
                    ui.ctx.fillStyle = 'var(--accent)';
                    ui.ctx.fill();
                    
                    currentStep++;
                    if (currentStep <= steps) {
                        requestAnimationFrame(frame);
                    } else {
                        resolve();
                    }
                }
                frame();
            });
        }

        function startDrawing(e) {
            State.writing.isDrawing = true;
            State.writing.hasDrawn = true;
            const rect = ui.canvas.getBoundingClientRect();
            State.writing.lastX = e.clientX - rect.left;
            State.writing.lastY = e.clientY - rect.top;
        }

        function draw(e) {
            if (!State.writing.isDrawing) return;
            const rect = ui.canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            ui.ctx.beginPath();
            ui.ctx.moveTo(State.writing.lastX, State.writing.lastY);
            ui.ctx.lineTo(x, y);
            ui.ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--accent');
            ui.ctx.lineWidth = 12;
            ui.ctx.lineCap = 'round';
            ui.ctx.stroke();

            State.writing.lastX = x;
            State.writing.lastY = y;
        }

        function stopDrawing() { State.writing.isDrawing = false; }
        function clearCanvas() {
            ui.ctx.clearRect(0, 0, ui.canvas.width, ui.canvas.height);
            State.writing.hasDrawn = false;
        }

        function checkDictionary() {
            const char = ui.built.textContent;
            const commonSyllables = ['가', '나', '다', '라', '마', '바', '사', '아', '자', '차', '카', '타', '파', '하', '한', '국', '말', '사', '랑', '물', '밥'];
            if (commonSyllables.includes(char)) {
                ui.built.style.color = "var(--success)";
                setTimeout(() => ui.built.style.color = "white", 1000);
            } else {
                ui.built.style.color = "var(--error)";
                setTimeout(() => ui.built.style.color = "white", 1000);
            }
        }

        function showScreen(name) {
            Object.values(ui.screens).forEach(s => s.classList.add('hidden'));
            ui.screens[name].classList.remove('hidden');
            ui.progressBar.style.width = '0%';
            if (name === 'start') renderMastery();
        }

        function startSession() {
            State.isReverse = document.getElementById('reverse-toggle').checked;
            State.currentDict = {};
            State.activeCats.forEach(c => Object.assign(State.currentDict, HANGUL_DATA[c]));
            State.currentKeys = Object.keys(State.currentDict);
            
            State.score = 0; State.streak = 0; State.maxStreak = 0; State.qCount = 0;
            updateStats();

            // Reset UI
            ui.areas.quiz.classList.remove('hidden');
            ui.options.classList.remove('hidden');
            ui.areas.builder.classList.add('hidden');
            ui.areas.writing.classList.add('hidden');
            ui.areas.keyboard.classList.add('hidden');
            ui.timer.classList.add('hidden');
            document.getElementById('fc-controls').classList.add('hidden');
            document.getElementById('writing-controls').classList.add('hidden');
            document.getElementById('writing-instruction').classList.add('hidden');
            document.getElementById('fc-instruction').classList.add('hidden');

            if (State.mode === 'builder') {
                setupBuilder();
                renderKeyboard();
                ui.areas.quiz.classList.add('hidden');
                ui.options.classList.add('hidden');
                ui.areas.builder.classList.remove('hidden');
                ui.areas.keyboard.classList.remove('hidden');
            } else if (State.mode === 'typing') {
                renderKeyboard();
                ui.options.classList.add('hidden');
                ui.areas.keyboard.classList.remove('hidden');
                nextQuestion();
            } else if (State.mode === 'flashcards') {
                document.getElementById('fc-instruction').classList.remove('hidden');
                startFlashcards();
            } else if (State.mode === 'speedMatch') {
                startSpeedMatch();
            } else if (State.mode === 'writing') {
                ui.options.classList.add('hidden');
                ui.areas.writing.classList.remove('hidden');
                document.getElementById('writing-controls').classList.remove('hidden');
                document.getElementById('writing-instruction').classList.remove('hidden');
                nextQuestion();
            } else {
                nextQuestion();
            }

            showScreen('study');
        }

        function startSpeedMatch() {
            State.timer.count = 60;
            ui.timer.classList.remove('hidden');
            ui.timer.textContent = "60s";
            State.timer.interval = setInterval(() => {
                State.timer.count--;
                ui.timer.textContent = State.timer.count + "s";
                if (State.timer.count <= 0) {
                    clearInterval(State.timer.interval);
                    endSession();
                }
            }, 1000);
            nextQuestion();
        }

        function startFlashcards() {
            State.flashcards.pool = [...State.currentKeys];
            shuffle(State.flashcards.pool);
            State.flashcards.index = 0;
            State.flashcards.isFlipped = false;
            
            ui.options.classList.add('hidden');
            document.getElementById('fc-controls').classList.remove('hidden');
            renderFlashcard();
        }

        function renderFlashcard() {
            const qChar = State.flashcards.pool[State.flashcards.index];
            const qAns = State.currentDict[qChar];
            
            State.currentQ = { char: qChar, rom: qAns };
            State.flashcards.isFlipped = false;
            
            ui.question.textContent = qChar;
            ui.question.classList.add('kr-font');
            ui.question.style.color = "white";
            ui.question.style.transform = "scale(1)";
            
            speak(qChar);
            
            ui.progressBar.style.width = `${((State.flashcards.index + 1) / State.flashcards.pool.length) * 100}%`;
        }

        function flipFlashcard() {
            State.flashcards.isFlipped = !State.flashcards.isFlipped;
            if (State.flashcards.isFlipped) {
                ui.question.textContent = State.currentQ.rom;
                ui.question.classList.remove('kr-font');
                ui.question.style.color = "var(--accent)";
            } else {
                ui.question.textContent = State.currentQ.char;
                ui.question.classList.add('kr-font');
                ui.question.style.color = "white";
                speak(State.currentQ.char);
            }
            ui.question.style.transform = "scale(1.1)";
            setTimeout(() => ui.question.style.transform = "scale(1)", 200);
        }

        function moveFlashcard(dir) {
            State.flashcards.index += dir;
            if (State.flashcards.index < 0) State.flashcards.index = State.flashcards.pool.length - 1;
            if (State.flashcards.index >= State.flashcards.pool.length) {
                endSession();
                return;
            }
            renderFlashcard();
        }

        function nextQuestion() {
            if (State.mode !== 'speedMatch' && State.qCount >= State.maxQ && State.mode !== 'syllableGuesser' && State.mode !== 'builder') {
                endSession();
                return;
            }

            State.isProcessing = false;
            ui.question.style.color = "white";
            ui.question.style.transform = "scale(1)";
            if (State.mode === 'writing') clearCanvas();

            let qChar, qAns; // qChar is Korean, qAns is Romanization

            if (State.mode === 'syllableGuesser') {
                qChar = generateRandomSyllable();
                qAns = romanizeSyllable(qChar);
            } else if (State.mode === 'typing') {
                // For typing mode, we only want single jamo
                const pool = [...Object.keys(HANGUL_DATA.consonants), ...Object.keys(HANGUL_DATA.vowels)];
                // Filter by active cats if they include consonants/vowels
                let activePool = [];
                if (State.activeCats.includes('consonants')) activePool.push(...Object.keys(HANGUL_DATA.consonants));
                if (State.activeCats.includes('vowels')) activePool.push(...Object.keys(HANGUL_DATA.vowels));
                if (State.activeCats.includes('doubleConsonants')) activePool.push(...Object.keys(HANGUL_DATA.doubleConsonants));
                if (State.activeCats.includes('diphthongs')) activePool.push(...Object.keys(HANGUL_DATA.diphthongs));
                
                const finalPool = activePool.length > 0 ? activePool : pool;
                qChar = finalPool[Math.floor(Math.random() * finalPool.length)];
                qAns = ROMAN_MAP[qChar];
            } else {
                // Weighted SRS selection
                const pool = [...State.currentKeys];
                const weights = pool.map(k => {
                    const m = State.persistence.mastery[k] || { correct: 0, total: 0 };
                    if (m.total === 0) return 5; // Priority for new
                    const ratio = m.correct / m.total;
                    return Math.max(1, 5 * (1 - ratio)); // Higher weight for lower accuracy
                });
                
                const totalWeight = weights.reduce((a, b) => a + b, 0);
                let r = Math.random() * totalWeight;
                for (let i = 0; i < pool.length; i++) {
                    r -= weights[i];
                    if (r <= 0) {
                        qChar = pool[i];
                        break;
                    }
                }
                qAns = State.currentDict[qChar];
            }

            // Determine what the user sees vs what they must pick
            const displayVal = State.isReverse ? qAns : qChar;
            const correctVal = State.isReverse ? qChar : qAns;
            State.currentQ = { display: displayVal, answer: correctVal, char: qChar, rom: qAns };

            ui.question.textContent = displayVal;
            if (State.isReverse) {
                ui.question.classList.remove('kr-font');
                ui.question.style.opacity = "1";
            } else {
                ui.question.classList.add('kr-font');
                if (State.mode === 'writing') {
                    ui.question.style.opacity = "0.15"; // Trace guide
                } else {
                    ui.question.style.opacity = "1";
                }
                speak(qChar);
            }

            // --- Distractor Generation ---
            if (State.mode === 'typing' || State.mode === 'builder') {
                ui.options.innerHTML = ''; // No options grid
            } else {
                const options = [correctVal];
                
                if (State.mode === 'syllableGuesser') {
                    const code = qChar.charCodeAt(0) - 44032;
                    const i = Math.floor(code / 588);
                    const m = Math.floor((code % 588) / 28);
                    const f = code % 28;

                    while (options.length < 4) {
                        let dChar;
                        const r = Math.random();
                        if (r < 0.33) dChar = combineHangul(Math.floor(Math.random() * 19), m, f);
                        else if (r < 0.66) dChar = combineHangul(i, Math.floor(Math.random() * 21), f);
                        else dChar = combineHangul(i, m, Math.floor(Math.random() * 28));
                        
                        const dAns = State.isReverse ? dChar : romanizeSyllable(dChar);
                        if (!options.includes(dAns)) options.push(dAns);
                    }
                } else if (State.activeCats.includes('vocabulary')) {
                    const targetLen = qChar.length;
                    const pool = Object.keys(HANGUL_DATA.vocabulary).filter(k => k.length === targetLen);
                    
                    while (options.length < 4 && pool.length >= 4) {
                        const k = pool[Math.floor(Math.random() * pool.length)];
                        const dVal = State.isReverse ? k : HANGUL_DATA.vocabulary[k];
                        if (!options.includes(dVal)) options.push(dVal);
                    }
                    // Fallback
                    while (options.length < 4) {
                        const k = State.currentKeys[Math.floor(Math.random() * State.currentKeys.length)];
                        const dVal = State.isReverse ? k : State.currentDict[k];
                        if (!options.includes(dVal)) options.push(dVal);
                    }
                } else {
                    let catPool = [];
                    for (const cat in HANGUL_DATA) {
                        if (HANGUL_DATA[cat][qChar]) {
                            catPool = State.isReverse ? Object.keys(HANGUL_DATA[cat]) : Object.values(HANGUL_DATA[cat]);
                            break;
                        }
                    }

                    while (options.length < 4 && catPool.length >= 4) {
                        const dVal = catPool[Math.floor(Math.random() * catPool.length)];
                        if (!options.includes(dVal)) options.push(dVal);
                    }
                    // Fallback
                    while (options.length < 4) {
                        const k = State.currentKeys[Math.floor(Math.random() * State.currentKeys.length)];
                        const dVal = State.isReverse ? k : State.currentDict[k];
                        if (!options.includes(dVal)) options.push(dVal);
                    }
                }

                shuffle(options);

                ui.options.innerHTML = '';
                options.forEach((opt, i) => {
                    const btn = document.createElement('button');
                    btn.className = "btn-option p-6 rounded-2xl text-xl font-bold relative group";
                    if (State.isReverse) btn.classList.add('kr-font', 'text-3xl');
                    
                    // Store answer in a data attribute to avoid substring matching issues
                    btn.dataset.value = opt;
                    btn.innerHTML = `<span class="absolute top-2 left-3 text-[10px] text-gray-500 opacity-50 group-hover:opacity-100">${i+1}</span>${opt}`;
                    btn.onclick = () => submitAnswer(opt, btn);
                    ui.options.appendChild(btn);
                });
            }

            ui.progressBar.style.width = `${(State.qCount / (State.mode === 'speedMatch' ? 1 : State.maxQ)) * 100}%`;
        }

        function submitAnswer(selected, btn) {
            if (State.isProcessing) return;
            
            // Writing mode check
            if (State.mode === 'writing' && !State.writing.hasDrawn) return;

            State.isProcessing = true;
            State.qCount++;

            const correct = selected === State.currentQ.answer || (State.mode === 'typing' && selected === State.currentQ.char);
            
            // Persistence update
            const char = State.currentQ.char;
            if (!State.persistence.mastery[char]) State.persistence.mastery[char] = { correct: 0, total: 0 };
            State.persistence.mastery[char].total++;
            if (correct) State.persistence.mastery[char].correct++;
            saveStats();

            if (correct) {
                State.score++; State.streak++;
                if (State.streak > State.maxStreak) State.maxStreak = State.streak;
                if (btn) btn.classList.add('correct');
                ui.question.style.color = "var(--success)";
                ui.question.style.opacity = "1";
            } else {
                State.streak = 0;
                if (btn) btn.classList.add('wrong');
                ui.question.style.color = "var(--error)";
                ui.question.style.opacity = "1";
                // Highlight correct one precisely using data-value
                if (State.mode !== 'typing' && State.mode !== 'builder') {
                    document.querySelectorAll('.btn-option').forEach(b => {
                        if (b.dataset.value === State.currentQ.answer) b.classList.add('correct');
                    });
                }
            }
            
            updateStats();
            setTimeout(nextQuestion, State.mode === 'speedMatch' ? 600 : 1200);
        }

        // --- Syllable Logic ---
        function combineHangul(i, m, f) {
            const code = (i * 588) + (m * 28) + f + 44032;
            return String.fromCharCode(code);
        }

        function generateRandomSyllable() {
            const i = Math.floor(Math.random() * 19);
            const m = Math.floor(Math.random() * 21);
            const f = Math.floor(Math.random() * 28);
            return combineHangul(i, m, f);
        }

        function romanizeSyllable(char) {
            const code = char.charCodeAt(0) - 44032;
            const i = Math.floor(code / 588);
            const m = Math.floor((code % 588) / 28);
            const f = code % 28;
            
            const iR = ROMAN_MAP[JAMO.initials[i]] || '';
            const mR = ROMAN_MAP[JAMO.medials[m]] || '';
            const fR = ROMAN_MAP[JAMO.finals[f]] || '';
            return iR + mR + fR;
        }

        // --- Builder Setup ---
        function setupBuilder() {
            renderBuilderCol('col-initial', JAMO.initials, 'i');
            renderBuilderCol('col-medial', JAMO.medials, 'm');
            renderBuilderCol('col-final', JAMO.finals.map(f => f === '' ? 'None' : f), 'f');
            updateBuilt();
        }

        function renderBuilderCol(id, list, type) {
            const container = document.getElementById(id);
            container.innerHTML = `<h4 class="text-[10px] text-gray-500 mb-2 sticky top-0 bg-transparent uppercase">${id.split('-')[1]}</h4>`;
            list.forEach((char, idx) => {
                const el = document.createElement('div');
                el.className = `builder-item kr-font text-xl ${State.builder[type] === idx ? 'selected' : ''}`;
                el.textContent = char;
                el.onclick = () => {
                    State.builder[type] = idx;
                    container.querySelectorAll('.builder-item').forEach(i => i.classList.remove('selected'));
                    el.classList.add('selected');
                    updateBuilt();
                };
                container.appendChild(el);
            });
        }

        function updateBuilt() {
            const char = combineHangul(State.builder.i, State.builder.m, State.builder.f);
            ui.built.textContent = char;
            ui.builtInfo.textContent = romanizeSyllable(char).split('').join(' + ');

            // Visualization Grid Update
            const blocks = document.querySelectorAll('#syllable-viz .viz-block');
            blocks.forEach(b => b.classList.remove('active'));
            
            // i (top)
            blocks[0].classList.add('active');
            blocks[1].classList.add('active');
            // m (middle)
            blocks[3].classList.add('active');
            blocks[4].classList.add('active');
            blocks[5].classList.add('active');
            // f (bottom)
            if (State.builder.f > 0) {
                blocks[6].classList.add('active');
                blocks[7].classList.add('active');
                blocks[8].classList.add('active');
            }
        }

        // --- Keyboard Functions ---
        function renderKeyboard() {
            const container = document.getElementById('virtual-keyboard');
            container.innerHTML = '';
            KEYBOARD_ROWS.forEach(row => {
                const rowEl = document.createElement('div');
                rowEl.className = 'keyboard-row';
                row.forEach(key => {
                    const char = KEYBOARD_MAP[key];
                    const keyEl = document.createElement('div');
                    keyEl.className = 'key';
                    keyEl.dataset.key = key;
                    keyEl.innerHTML = `
                        <span class="kor">${char}</span>
                        <span class="eng">${key}</span>
                    `;
                    keyEl.onclick = () => handleKeyClick(char, key);
                    rowEl.appendChild(keyEl);
                });
                container.appendChild(rowEl);
            });
        }

        function handleKeyClick(korChar, engKey) {
            if (State.isProcessing) return;

            // Highlight key
            const keyEl = document.querySelector(`.key[data-key="${engKey}"]`);
            if (keyEl) {
                keyEl.classList.add('active');
                setTimeout(() => keyEl.classList.remove('active'), 150);
            }

            if (State.mode === 'typing') {
                if (korChar === State.currentQ.char) {
                    submitAnswer(korChar);
                } else {
                    // Visual feedback for wrong key
                    ui.question.style.color = "var(--error)";
                    setTimeout(() => {
                        if (!State.isProcessing) ui.question.style.color = "white";
                    }, 500);
                }
            } else if (State.mode === 'builder') {
                // Auto-select in builder
                const isVowel = JAMO.medials.includes(korChar);
                if (isVowel) {
                    const idx = JAMO.medials.indexOf(korChar);
                    if (idx !== -1) {
                        State.builder.m = idx;
                        renderBuilderCol('col-medial', JAMO.medials, 'm');
                        updateBuilt();
                    }
                } else {
                    const iIdx = JAMO.initials.indexOf(korChar);
                    const fIdx = JAMO.finals.indexOf(korChar);
                    
                    if (iIdx !== -1) {
                        State.builder.i = iIdx;
                        renderBuilderCol('col-initial', JAMO.initials, 'i');
                    }
                    if (fIdx !== -1) {
                        State.builder.f = fIdx;
                        renderBuilderCol('col-final', JAMO.finals.map(f => f === '' ? 'None' : f), 'f');
                    }
                    updateBuilt();
                }
            }
        }

        // --- Utilities ---
        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ko-KR';
            msg.rate = State.settings.audioSpeed || 0.9;
            window.speechSynthesis.speak(msg);
        }

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        function updateStats() {
            ui.score.textContent = State.score;
            ui.streak.textContent = State.streak;
        }

        function endSession() {
            clearInterval(State.timer.interval);
            showScreen('results');
            document.getElementById('final-score').textContent = State.score;
            document.getElementById('final-acc').textContent = State.qCount > 0 ? Math.round((State.score / State.qCount) * 100) + '%' : '0%';
            document.getElementById('final-streak').textContent = State.maxStreak;
        }

        function handleInput(e) {
            if (ui.screens.study.classList.contains('hidden') || State.isProcessing) return;
            
            // Check for virtual keyboard mapping
            if (KEYBOARD_MAP[e.key]) {
                handleKeyClick(KEYBOARD_MAP[e.key], e.key);
                return;
            }

            const key = parseInt(e.key);
            if (key >= 1 && key <= 4) {
                const btns = ui.options.querySelectorAll('button');
                if (btns[key - 1]) btns[key - 1].click();
            }
            if (e.key === 'r') speak(State.currentQ.char);
            if (e.key === 'Enter' && State.mode === 'writing') document.getElementById('submit-writing').click();
            if (e.key === 'Escape') document.getElementById('clear-writing').click();
        }

        init();
        window.addEventListener('keydown', handleInput);
    </script>
</body>
</html>
