<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Jamie Sessions</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }
        h1 { 
            font-family: var(--font-serif); 
            color: var(--accent);
            font-size: 8rem; 
            line-height: 1; 
            margin-bottom: 20px; 
        }
        p { 
            font-size: 1.5rem; 
            margin-bottom: 40px; 
            color: var(--text-muted); 
            max-width: 500px;
        }
        @media (max-width: 768px) {
            h1 { font-size: 5rem; }
            p { font-size: 1.2rem; }
        }
        @media (max-width: 480px) {
            h1 { font-size: 3.5rem; }
            p { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    
    <header><nav></nav></header>

    <main>
        <h1>404</h1>
        <p>The page you are looking for has been lost in the digital void.</p>
        <a href="index.html" class="cta-button">Go Back Home</a>
    </main>

    <script src="components.js"></script>
</body>
</html>
